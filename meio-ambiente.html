<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Treinamento Ambiental | Pavidez</title>
</head>

<body style="margin:0;font-family:Arial;background:#f5f5f5;">

<header style="background:#fff;border-bottom:4px solid #f2b705;padding:20px;">
  <img src="imagem/logo-pavidez.png" style="height:60px;">
</header>

<main style="max-width:1000px;margin:40px auto;background:#fff;padding:40px;border-radius:8px;">

  <h1>🌿 Meio Ambiente e Sustentabilidade</h1>

  <h2>Identificação</h2>
  <input type="text" id="nome" placeholder="Nome completo"
         style="padding:10px;width:100%;margin-bottom:10px;">

  <input type="text" id="cpf" placeholder="CPF ou matrícula"
         style="padding:10px;width:100%;margin-bottom:20px;">

  <h2>Treinamento</h2>
  <iframe width="100%" height="400"
    src="https://www.youtube.com/embed/2uZ2qf9wX9U"
    frameborder="0" allowfullscreen>
  </iframe>

  <h2 style="margin-top:30px;">Validação</h2>

  <p>O descarte correto de óleo deve ser:</p>
  <input type="radio" name="q1" value="errado"> No solo<br>
  <input type="radio" name="q1" value="certo"> Em local apropriado<br><br>

  <p>Resíduos devem ser:</p>
  <input type="radio" name="q2" value="certo"> Separados corretamente<br>
  <input type="radio" name="q2" value="errado"> Misturados<br><br>

  <button onclick="finalizar()"
          style="background:#28a745;color:#fff;padding:12px 25px;border:none;font-weight:bold;cursor:pointer;">
    Finalizar Treinamento
  </button>

  <div id="certificado" style="display:none;margin-top:40px;
       padding:20px;border:2px solid green;background:#eaffea;">
    <h2>✔ Treinamento Concluído</h2>
    <button onclick="gerarCertificado()"
            style="background:#007bff;color:#fff;padding:10px 20px;border:none;cursor:pointer;">
      Gerar Certificado
    </button>
  </div>

</main>

<script>

let inicio = Date.now();

function finalizar() {

  let nome = document.getElementById("nome").value;
  let cpf = document.getElementById("cpf").value;

  if (!nome || !cpf) {
    alert("Preencha nome e CPF.");
    return;
  }

  let tempo = (Date.now() - inicio) / 1000;
  if (tempo < 60) {
    alert("Tempo mínimo de treinamento não atingido.");
    return;
  }

  let q1 = document.querySelector('input[name="q1"]:checked');
  let q2 = document.querySelector('input[name="q2"]:checked');

  if (!q1 || !q2) {
    alert("Responda todas as perguntas.");
    return;
  }

  if (q1.value !== "certo" || q2.value !== "certo") {
    alert("Você precisa acertar todas as questões.");
    return;
  }

  localStorage.setItem("treinamento_meio_ambiente", nome + " - " + cpf);

  document.getElementById("certificado").style.display = "block";
}

function gerarCertificado() {

  let nome = document.getElementById("nome").value;
  let data = new Date().toLocaleDateString();

  let win = window.open('', '', 'width=1100,height=800');

  win.document.write(`
  <html>
  <head>
    <title>Certificado</title>
  </head>

  <body style="margin:0;background:#dcdcdc;font-family:'Times New Roman', serif;">

    <div style="
      width:1000px;
      margin:30px auto;
      padding:20px;
      background:#e5e5e5;
      border:6px solid #777;
    ">

      <div style="
        border:2px solid #777;
        padding:40px;
        background:#f9f9f9;
        text-align:center;
      ">

        <img src="https://rodrigosina09-cloud.github.io/treinamentos-pavidez/imagem/logo-pavidez.png"
             style="height:60px;margin-bottom:10px;">

        <h1 style="font-size:34px;margin:20px 0;letter-spacing:2px;color:#444;">
          CERTIFICADO DE PARTICIPAÇÃO
        </h1>

        <p style="font-size:14px;">CERTIFICAMOS QUE</p>

        <h2 style="font-size:26px;margin:15px 0;">
          ${nome.toUpperCase()}
        </h2>

        <p>PARTICIPOU DO TREINAMENTO DE:</p>

        <h3>MEIO AMBIENTE E SUSTENTABILIDADE</h3>

        <p style="margin-top:20px;">
          Realizado em ${data}
        </p>

        <p>Local: Londrina - PR</p>

        <div style="display:flex;justify-content:space-between;margin-top:60px;">
          <div>___________________________<br>Instrutor</div>
          <div>___________________________<br>Participante</div>
        </div>

      </div>
    </div>

  </body>
  </html>
  `);

  win.document.close();
  win.focus();
}

</script>

</body>
</html>
