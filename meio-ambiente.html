<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Treinamento - Meio Ambiente</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f8;
}

header {
  background: #2c3e50;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  max-width: 1000px;
  margin: auto;
  padding: 20px;
}

.card {
  background: white;
  padding: 20px;
  margin-bottom: 20px;
  border-radius: 10px;
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  margin: 5px 0 15px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

input[type="radio"] {
  margin-right: 8px;
}

.pergunta {
  margin-bottom: 20px;
  padding: 15px;
  background: #f9fafb;
  border-radius: 8px;
}

.pergunta label {
  display: flex;
  align-items: center;
  margin-bottom: 8px;
}

button {
  background: #27ae60;
  color: white;
  padding: 12px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.resultado {
  font-weight: bold;
  margin-top: 15px;
}
</style>
</head>

<body>

<header>
<h1>Treinamento de Meio Ambiente em Obras</h1>
</header>

<div class="container">

<!-- CONTEÚDO -->
<div class="card">
<h2>🌱 Conteúdo</h2>
<p>Treinamento sobre impactos ambientais, resíduos e boas práticas na obra.</p>
</div>

<!-- VIDEO -->
<div class="card">
<h2>🎥 Vídeo Obrigatório</h2>

<button onclick="abrirVideo(this)">▶ Assistir Vídeo</button>

<div id="videoContainer" style="display:none; margin-top:20px;">
  <iframe width="100%" height="400"
    src="https://www.youtube.com/embed/2n4p8R7s0fQ"
    allowfullscreen>
  </iframe>
</div>

<p id="statusVideo" style="color:red;">⚠ Assista o vídeo para liberar a avaliação</p>

</div>

<!-- AVALIAÇÃO -->
<div class="card">
<h2>📝 Avaliação</h2>

<input type="text" id="nome" placeholder="Nome">
<input type="text" id="funcao" placeholder="Função">
<input type="text" id="cpf" placeholder="CPF">

<label>
<input type="checkbox" id="declaracao">
Declaro que eu mesmo realizei este treinamento.
</label>

<h3>Perguntas</h3>

<div class="pergunta">
<p>1. Resíduos perigosos devem:</p>
<label><input type="radio" name="q1" value="errado"> Ir para lixo comum</label>
<label><input type="radio" name="q1" value="certo"> Ter destinação correta</label>
</div>

<div class="pergunta">
<p>2. Pode jogar óleo no solo?</p>
<label><input type="radio" name="q2" value="certo"> Não</label>
<label><input type="radio" name="q2" value="errado"> Sim</label>
</div>

<button onclick="corrigir()">Finalizar</button>

<p id="resultado" class="resultado"></p>
</div>

</div>

<script>
let videoAssistido = false;
let inicioTreinamento = new Date();

function abrirVideo(botao) {
  document.getElementById("videoContainer").style.display = "block";
  botao.style.display = "none";

  setTimeout(() => {
    videoAssistido = true;
    document.getElementById("statusVideo").innerHTML = "✅ Vídeo liberado";
    document.getElementById("statusVideo").style.color = "green";
  }, 15000); // 15 segundos mínimo
}

function corrigir() {

let nome = document.getElementById("nome").value;
let funcao = document.getElementById("funcao").value;
let cpf = document.getElementById("cpf").value;
let declaracao = document.getElementById("declaracao").checked;

let tempo = (new Date() - inicioTreinamento) / 1000;

if(!videoAssistido){
  alert("Assista o vídeo primeiro!");
  return;
}

if(tempo < 30){
  alert("Tempo mínimo de treinamento não atingido!");
  return;
}

if(nome === "" || funcao === "" || cpf === ""){
  alert("Preencha todos os dados!");
  return;
}

if(!declaracao){
  alert("Confirme a declaração!");
  return;
}

let respostas = document.querySelectorAll('input[type="radio"]:checked');

if(respostas.length < 2){
  alert("Responda todas as perguntas!");
  return;
}

let pontos = 0;

respostas.forEach(r => {
  if(r.value === "certo") pontos++;
});

let data = new Date().toLocaleString();

let resultado = document.getElementById("resultado");

if(pontos >= 2){
  resultado.innerHTML = `
  ✅ APROVADO <br>
  Nome: ${nome} <br>
  CPF: ${cpf} <br>
  Função: ${funcao} <br>
  Data: ${data}
  `;
  resultado.style.color = "green";
}else{
  resultado.innerHTML = `❌ REPROVADO (${pontos})`;
  resultado.style.color = "red";
}

}
</script>

</body>
</html>
